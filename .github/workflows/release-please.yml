name: Release and Publish

on:
    push:
        branches:
            - main

permissions:
    contents: write
    pull-requests: write

jobs:
    release-please:
        if: startsWith(github.event.head_commit.message, 'feat') || startsWith(github.event.head_commit.message, 'fix') || startsWith(github.event.head_commit.message, 'chore') || startsWith(github.event.head_commit.message, 'refactor') || startsWith(github.event.head_commit.message, 'revert')
        runs-on: ubuntu-latest
        outputs:
            vlossom-released: ${{ steps.release.outputs['packages/vlossom--release_created'] }}
            vlossom-mcp-released: ${{ steps.release.outputs['packages/vlossom-mcp--release_created'] }}
        steps:
            - uses: googleapis/release-please-action@v5
              id: release
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  config-file: release-please-config.json
                  manifest-file: release-please-manifest.json

            - name: Print release-please outputs
              run: |
                  echo "vlossom released: ${{ steps.release.outputs['packages/vlossom--release_created'] }}"
                  echo "vlossom-mcp released: ${{ steps.release.outputs['packages/vlossom-mcp--release_created'] }}"

    publish-vlossom:
        needs: release-please
        if: ${{ needs.release-please.outputs.vlossom-released == 'true' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10
            - uses: actions/setup-node@v5
              with:
                  node-version-file: '.nvmrc'
                  cache: 'pnpm'
                  cache-dependency-path: ./packages/vlossom/pnpm-lock.yaml
                  registry-url: 'https://registry.npmjs.org'
            - name: Install dependencies
              working-directory: ./packages/vlossom
              run: pnpm install
            - name: Build vlossom
              working-directory: ./packages/vlossom
              run: pnpm build
            - name: Publish vlossom
              working-directory: ./packages/vlossom
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.VLOSSOM_NPM_TOKEN }}
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  if [[ "$VERSION" == *"-"* ]]; then
                    TAG=$(echo "$VERSION" | sed 's/.*-\([a-zA-Z]*\).*/\1/')
                    pnpm publish --access public --no-git-checks --tag $TAG
                  else
                    pnpm publish --access public --no-git-checks
                  fi

    publish-vlossom-mcp:
        needs: release-please
        if: ${{ needs.release-please.outputs.vlossom-mcp-released == 'true' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: '.nvmrc'
                  cache: 'npm'
                  cache-dependency-path: ./packages/vlossom-mcp/package-lock.json
                  registry-url: 'https://registry.npmjs.org'
            - name: Install dependencies
              working-directory: ./packages/vlossom-mcp
              run: npm ci
            - name: Build vlossom-mcp
              working-directory: ./packages/vlossom-mcp
              run: npm run build
            - name: Publish vlossom-mcp
              working-directory: ./packages/vlossom-mcp
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.VLOSSOM_NPM_TOKEN }}
              run: |
                  VERSION=$(node -p "require('./package.json').version")
                  if [[ "$VERSION" == *"-"* ]]; then
                    TAG=$(echo "$VERSION" | sed 's/.*-\([a-zA-Z]*\).*/\1/')
                    npm publish --access public --tag $TAG
                  else
                    npm publish --access public
                  fi
